# ------------------------------------------------------------------------------
# nginx configuration for wildcard.you
# ------------------------------------------------------------------------------

# Rate limiting zone for API endpoints (10 req/s per IP, 10 MB shared zone)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# Upstream Node cluster managed by pm2
upstream wildcard_backend {
    server 127.0.0.1:3000;
    keepalive 64;
}

# --- HTTP -> HTTPS redirect ---------------------------------------------------
server {
    listen 80;
    listen [::]:80;
    server_name wildcard.you www.wildcard.you;

    # Let certbot handle ACME challenges
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS server -------------------------------------------------------------
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name wildcard.you www.wildcard.you;

    # --- SSL (Let's Encrypt / certbot) ----------------------------------------
    ssl_certificate     /etc/letsencrypt/live/wildcard.you/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/wildcard.you/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # --- Gzip compression -----------------------------------------------------
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/html
        text/javascript
        application/javascript
        application/json
        application/wasm
        image/svg+xml;

    # --- Security headers -----------------------------------------------------
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; media-src 'self'; object-src 'none'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;

    # --- Static assets (served directly by nginx) -----------------------------
    root /opt/wildcard/apps/web/dist;

    # Hashed assets get long cache (Vite adds content hashes to filenames)
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Other static files (favicon, manifest, etc.)
    location ~* \.(ico|png|jpg|jpeg|gif|svg|webp|woff2?|ttf|eot|wasm)$ {
        expires 7d;
        add_header Cache-Control "public";
        try_files $uri @backend;
    }

    # --- API routes (proxied to Node) -----------------------------------------
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://wildcard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # --- SSR routes (/s/*) proxied to Node ------------------------------------
    location /s/ {
        proxy_pass http://wildcard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # --- SEO routes (sitemap, robots) proxied to Node -------------------------
    location = /sitemap.xml {
        proxy_pass http://wildcard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /robots.txt {
        proxy_pass http://wildcard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # --- WebSocket support (for future dev HMR) -------------------------------
    location /ws {
        proxy_pass http://wildcard_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # --- SPA fallback ---------------------------------------------------------
    # For all other routes, try the file on disk first, then fall back to
    # index.html so the Preact SPA router can handle it.
    location / {
        try_files $uri $uri/ /index.html;

        # HTML should not be cached (so deploys take effect immediately)
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }

    # --- Named backend fallback -----------------------------------------------
    location @backend {
        proxy_pass http://wildcard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
