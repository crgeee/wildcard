name: CI

on:
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  lint-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - run: pnpm format:check
      - run: pnpm lint

  lint-rust:
    name: Clippy & Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/engine
      - run: cd packages/engine && cargo fmt --check
      - run: cd packages/engine && cargo clippy -- -D warnings

  test-engine:
    name: Test Engine (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/engine
      - run: cd packages/engine && cargo test

  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/engine
      - run: cargo install wasm-pack
      - run: cd packages/engine && wasm-pack build --target web
      - uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: packages/engine/pkg/
          retention-days: 1

  typecheck:
    name: TypeScript Typecheck
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: packages/engine/pkg/
      - run: pnpm -r build

  test-ts:
    name: Test TypeScript Packages
    needs: build-wasm
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: packages/engine/pkg/
      - run: pnpm -r build
      - run: pnpm -r test

  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: npm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo install cargo-audit
      - run: cd packages/engine && cargo audit
