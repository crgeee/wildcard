name: Version Bump

on:
  push:
    branches: [main]

jobs:
  version:
    runs-on: ubuntu-latest
    # Skip if this push is already a version bump commit
    if: "!startsWith(github.event.head_commit.message, 'chore(release):')"

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # RELEASE_TOKEN (a PAT) is required so the version bump push
          # triggers downstream workflows (deploy.yml). GITHUB_TOKEN would
          # suppress those triggers. Create a fine-grained PAT with contents:write.
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine bump type from commits since last tag
        id: bump
        run: |
          # Get the latest tag, or use initial commit if none exists
          LAST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)

          # Get commit messages since last tag
          COMMITS=$(git log "$LAST_TAG"..HEAD --pretty=format:"%s%n%b" 2>/dev/null || echo "")

          BUMP=""

          # Check for breaking changes
          if echo "$COMMITS" | grep -qE "^[a-z]+(\(.+\))?!:|BREAKING CHANGE"; then
            BUMP="major"
          # Check for features
          elif echo "$COMMITS" | grep -qE "^feat(\(.+\))?:"; then
            BUMP="minor"
          # Check for fixes, perf, refactor (releasable changes)
          elif echo "$COMMITS" | grep -qE "^(fix|perf|refactor)(\(.+\))?:"; then
            BUMP="patch"
          fi

          echo "type=$BUMP" >> "$GITHUB_OUTPUT"
          if [ -n "$BUMP" ]; then
            echo "Bump type: $BUMP"
          else
            echo "No releasable commits found, skipping version bump"
          fi

      - name: Bump version
        if: steps.bump.outputs.type != ''
        run: |
          npm version ${{ steps.bump.outputs.type }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          git add package.json
          git commit -m "chore(release): v${VERSION}"
          git tag "v${VERSION}"
          git push --follow-tags
