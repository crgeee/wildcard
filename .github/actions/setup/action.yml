name: Setup Node & pnpm
description: Install Node 22, pnpm 9, and all project dependencies (checkout must happen before calling this action)

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4
      with:
        version: 9

    - uses: actions/setup-node@v6
      with:
        node-version: 22
        cache: pnpm

    - run: pnpm install --frozen-lockfile
      shell: bash
