<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Offline — WildCard</title>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family:
          -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        background: #f5f5f5;
        color: #333;
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        padding: 1rem;
      }
      .container {
        text-align: center;
        max-width: 420px;
      }
      .logo {
        font-size: 2rem;
        font-weight: 700;
        letter-spacing: -0.02em;
        margin-bottom: 1.5rem;
        color: #111;
      }
      .logo span {
        color: #0066cc;
      }
      h1 {
        font-size: 1.5rem;
        margin-bottom: 0.75rem;
      }
      p {
        font-size: 1rem;
        line-height: 1.5;
        color: #555;
        margin-bottom: 1.5rem;
      }
      button {
        background: #0066cc;
        color: #fff;
        border: none;
        padding: 0.75rem 2rem;
        font-size: 1rem;
        border-radius: 6px;
        cursor: pointer;
        transition: background 0.15s;
      }
      button:hover {
        background: #0052a3;
      }
      button:active {
        background: #004080;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">Wild<span>Card</span></div>
      <h1>You're offline</h1>
      <p>
        WildCard works best with an internet connection, but your locally saved stacks are still
        available.
      </p>
      <button onclick="location.reload()">Try again</button>
    </div>
  </body>
</html>
